<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadMini AI - مساعد ذكي</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --sidebar-bg: #16213e;
            --chat-bg: #0f3460;
            --user-msg: #e94560;
            --ai-msg: #533483;
            --text: #eee;
            --input-bg: #222244;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            box-sizing: border-box;
            border-left: 1px solid #333;
            overflow-y: auto;
        }
        .sidebar h2 {
            font-size: 1.2rem;
            margin: 0 0 1rem 0;
            text-align: center;
        }
        #new-chat-btn {
            background: var(--user-msg);
            border: none;
            color: white;
            padding: 0.7rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 0.7rem 0.5rem;
            border-radius: 6px;
            margin-bottom: 0.3rem;
            cursor: pointer;
            background: #1e2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-item.active {
            background: var(--user-msg);
        }
        .chat-item .delete-btn {
            background: transparent;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* منطقة الدردشة */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            border-radius: 10px 0 0 10px;
            margin: 0.5rem 0 0.5rem 0;
        }
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid #444;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-msg);
            border-bottom-left-radius: 0.3rem;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-msg);
            border-bottom-right-radius: 0.3rem;
        }
        .input-area {
            display: flex;
            padding: 1rem;
            gap: 0.5rem;
            border-top: 1px solid #444;
        }
        #message-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid #555;
            border-radius: 20px;
            padding: 0.7rem 1rem;
            color: white;
            font-size: 1rem;
            resize: none;
        }
        #send-btn {
            background: var(--user-msg);
            border: none;
            color: white;
            padding: 0 1.5rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }

        /* للجوال */
        @media (max-width: 600px) {
            .sidebar { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📂 المحادثات</h2>
        <button id="new-chat-btn">➕ محادثة جديدة</button>
        <div class="chat-list" id="chat-list"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-title">محادثة جديدة</div>
        <div class="messages-container" id="messages"></div>
        <div class="input-area">
            <textarea id="message-input" rows="1" placeholder="اكتب رسالتك..."></textarea>
            <button id="send-btn">إرسال</button>
        </div>
    </div>

    <script>
        // إدارة البيانات باستخدام localStorage
        const STORAGE_KEY = 'shadmini_chats';
        let chats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let currentChatId = null;

        // عناصر واجهة المستخدم
        const chatListEl = document.getElementById('chat-list');
        const messagesEl = document.getElementById('messages');
        const chatTitle = document.getElementById('chat-title');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const newChatBtn = document.getElementById('new-chat-btn');

        // دالة لتوليد معرف فريد
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // حفظ كل المحادثات في localStorage
        function saveChats() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        }

        // عرض قائمة المحادثات في الشريط الجانبي
        function renderChatList() {
            if (!chatListEl) return;
            chatListEl.innerHTML = '';
            for (let id in chats) {
                const chat = chats[id];
                const item = document.createElement('div');
                item.className = 'chat-item' + (id === currentChatId ? ' active' : '');
                item.innerHTML = `<span>${chat.title || 'محادثة'}</span><button class="delete-btn" data-id="${id}">🗑️</button>`;
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) {
                        e.stopPropagation();
                        deleteChat(id);
                    } else {
                        loadChat(id);
                    }
                });
                chatListEl.appendChild(item);
            }
        }

        // تحميل محادثة محددة
        function loadChat(id) {
            currentChatId = id;
            const chat = chats[id];
            if (!chat) return;
            chatTitle.textContent = chat.title || 'محادثة';
            renderMessages(chat.messages || []);
            renderChatList();
        }

        // عرض الرسائل في نافذة الدردشة
        function renderMessages(messages) {
            messagesEl.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message ' + msg.role;
                div.textContent = msg.content;
                messagesEl.appendChild(div);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        // إنشاء محادثة جديدة
        function createNewChat() {
            const id = generateId();
            chats[id] = {
                title: 'محادثة جديدة',
                messages: []
            };
            saveChats();
            currentChatId = id;
            chatTitle.textContent = 'محادثة جديدة';
            renderMessages([]);
            renderChatList();
            messageInput.focus();
        }

        // حذف محادثة
        function deleteChat(id) {
            if (!confirm('هل أنت متأكد من حذف هذه المحادثة؟')) return;
            delete chats[id];
            saveChats();
            if (currentChatId === id) {
                // إذا كانت المحادثة الحالية هي المحذوفة، افتح محادثة أخرى أو أنشئ جديدة
                const remainingIds = Object.keys(chats);
                if (remainingIds.length > 0) {
                    loadChat(remainingIds[0]);
                } else {
                    currentChatId = null;
                    chatTitle.textContent = 'محادثة جديدة';
                    renderMessages([]);
                }
            }
            renderChatList();
        }

        // إرسال رسالة والحصول على رد من الذكاء الاصطناعي
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // إذا لم تكن هناك محادثة نشطة، أنشئ واحدة تلقائياً
            if (!currentChatId || !chats[currentChatId]) {
                createNewChat();
            }

            const chat = chats[currentChatId];

            // إضافة رسالة المستخدم
            chat.messages.push({ role: 'user', content: content });
            saveChats();
            renderMessages(chat.messages);
            messageInput.value = '';
            messageInput.style.height = 'auto';

            // تحديث عنوان المحادثة بأول رسالة من المستخدم إذا كان العنوان افتراضياً
            if (chat.title === 'محادثة جديدة' && chat.messages.length === 1) {
                chat.title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                saveChats();
                chatTitle.textContent = chat.title;
                renderChatList();
            }

            // إظهار مؤشر "جاري التفكير..."
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message ai';
            thinkingDiv.textContent = '⏳ جاري التفكير...';
            messagesEl.appendChild(thinkingDiv);
            messagesEl.scrollTop = messagesEl.scrollHeight;

            try {
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chat.messages })
                });

                // إزالة مؤشر التفكير
                thinkingDiv.remove();

                if (!response.ok) throw new Error(`خطأ: ${response.status}`);
                const data = await response.json();
                const aiMessage = { role: 'assistant', content: data.result || '⚠️ لم يتم استلام رد' };
                chat.messages.push(aiMessage);
                saveChats();
                renderMessages(chat.messages);
                renderChatList();

            } catch (err) {
                thinkingDiv.remove();
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message ai';
                errorDiv.textContent = '❌ حدث خطأ أثناء الاتصال';
                messagesEl.appendChild(errorDiv);
                console.error(err);
            }
        }

        // إرسال بالضغط على Enter (مع Shift+Enter لسطر جديد)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        newChatBtn.addEventListener('click', createNewChat);

        // بدء التشغيل: تحميل آخر محادثة أو البدء من الصفر
        (function init() {
            const ids = Object.keys(chats);
            if (ids.length > 0) {
                // تحميل آخر محادثة تم التعديل عليها (أو أول واحدة)
                loadChat(ids[ids.length - 1]);
            } else {
                createNewChat();
            }
        })();
    </script>
</body>
    </html>
