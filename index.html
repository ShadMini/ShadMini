<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadMini AI | منصتك الذكية</title>
    <!-- مكتبة Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-sidebar: #0d0d24;
            --accent: #7c5cfc;
            --accent-glow: #a688ff;
            --user-bg: #1e1e4a;
            --ai-bg: #1c1c3a;
            --text-primary: #eaeaea;
            --text-secondary: #b0b0d0;
            --border: #2a2a4a;
            --danger: #ff5e7a;
            --glass: rgba(20, 20, 50, 0.7);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light-mode {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-sidebar: #eeeeee;
            --user-bg: #e0e7ff;
            --ai-bg: #f0f0f0;
            --text-primary: #1a1a1a;
            --text-secondary: #444;
            --border: #ccc;
            --glass: rgba(255,255,255,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background var(--transition);
        }

        /* ========== الشريط الجانبي ========== */
        .sidebar {
            width: 300px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 1.2rem;
            border-right: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: transform var(--transition), background var(--transition);
            z-index: 20;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .sidebar-header .logo { font-size: 2rem; }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #e879f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        #new-chat-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            transition: background var(--transition), transform var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            box-shadow: 0 4px 12px rgba(124, 92, 252, 0.3);
        }

        #new-chat-btn:hover { background: #6d4cf0; transform: translateY(-1px); }
        #new-chat-btn:active { transform: scale(0.97); }

        #search-input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem;
            margin-bottom: 0.8rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            display: none;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .chat-item {
            padding: 0.75rem 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            background: var(--glass);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background var(--transition), border var(--transition);
            border: 1px solid transparent;
            font-size: 0.9rem;
        }

        .chat-item:hover {
            background: rgba(124, 92, 252, 0.15);
            border-color: var(--accent);
        }

        .chat-item.active {
            background: var(--accent);
            border-color: var(--accent-glow);
            box-shadow: 0 0 12px rgba(124, 92, 252, 0.4);
        }

        .chat-item .chat-title-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-item .delete-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem;
            border-radius: 6px;
            transition: color var(--transition), background var(--transition);
        }

        .chat-item .delete-btn:hover {
            color: var(--danger);
            background: rgba(255, 94, 122, 0.15);
        }

        /* ========== منطقة الدردشة ========== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            border-radius: var(--radius) 0 0 var(--radius);
            margin: 0.6rem 0 0.6rem 0.6rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: background var(--transition);
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            font-size: 1.15rem;
            background: var(--glass);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
        }

        #chat-title {
            cursor: pointer;
        }

        .model-selector {
            padding: 0.6rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--glass);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        #model-select {
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .message {
            max-width: 82%;
            padding: 0.9rem 1.2rem;
            border-radius: 1.4rem;
            line-height: 1.6;
            position: relative;
            animation: fadeInUp 0.3s ease-out;
            font-size: 0.95rem;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-bottom-right-radius: 0.4rem;
            border: 1px solid #3a3a6a;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--ai-bg);
            border-bottom-left-radius: 0.4rem;
            border: 1px solid #2f2f55;
        }

        .msg-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
            justify-content: flex-end;
        }

        .msg-actions button {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .msg-actions button:hover {
            background: var(--accent);
            color: white;
        }

        .typing-indicator {
            align-self: flex-start;
            background: var(--ai-bg);
            border-radius: 1.4rem;
            padding: 0.8rem 1.2rem;
            display: flex; align-items: center; gap: 0.3rem;
        }

        .typing-dot {
            width: 8px; height: 8px; background: #888;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; background: var(--accent-glow); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex; padding: 1rem 1.5rem; gap: 0.75rem;
            border-top: 1px solid var(--border);
            background: var(--glass); backdrop-filter: blur(8px);
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            resize: none; max-height: 120px;
            font-family: inherit;
        }

        #send-btn, #stop-btn {
            background: var(--accent);
            border: none; color: white;
            padding: 0.8rem 1.2rem; border-radius: 18px;
            cursor: pointer; font-weight: 700;
            transition: background var(--transition);
        }

        #stop-btn { background: var(--danger); display: none; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3a3a6a; border-radius: 10px; }

        @media (max-width: 700px) {
            .sidebar {
                position: absolute; left: 0; top: 0; bottom: 0;
                transform: translateX(100%); width: 280px;
            }
            .sidebar.open { transform: translateX(0); }
            .chat-area { margin: 0; border-radius: 0; }
            .mobile-menu-btn { display: block !important; }
        }

        .mobile-menu-btn {
            display: none; background: none; border: none;
            color: inherit; font-size: 1.5rem; cursor: pointer; margin-right: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">🧠</span>
            <h2>ShadMini AI</h2>
        </div>
        <div class="theme-toggle" id="theme-toggle">
            <span>🌙</span><span>وضع داكن</span>
        </div>
        <button id="new-chat-btn">✨ محادثة جديدة</button>
        <input type="text" id="search-input" placeholder="ابحث عن محادثة...">
        <div class="chat-list" id="chat-list"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <button class="mobile-menu-btn" id="menu-toggle">☰</button>
            <span id="chat-title">محادثة جديدة</span>
        </div>

        <div class="model-selector">
            <label for="model-select">🧠 النموذج:</label>
            <select id="model-select">
                <optgroup label="🧠 محادثة عامة">
                    <option value="gpt-4o-mini">⚡ GPT-4o Mini (عام | سريع)</option>
                    <option value="deepseek-r1">🧠 DeepSeek R1 (منطق | تفكير عميق)</option>
                    <option value="llama-3.1-8b">📝 Llama 3.1 8B (عام | خفيف)</option>
                    <option value="gpt-4.1-nano">⚡ GPT-4.1 Nano (خارق السرعة)</option>
                    <option value="aya-expanse-8b">🌍 Aya Expanse (متعدد اللغات)</option>
                    <option value="jais-30b">عربي Jais 30B (عربي)</option>
                </optgroup>
                <optgroup label="💻 تطوير وبرمجة">
                    <option value="llama-3.3-70b">🦙 Llama 3.3 70B (باك-إند | كود)</option>
                    <option value="deepseek-coder-v2">💻 DeepSeek Coder V2 (فرونت-إند)</option>
                    <option value="codestral">🛠️ Codestral (فول-ستاك)</option>
                    <option value="phi-3.5-moe">🧩 Phi-3.5 MoE (فول-ستاك | معقد)</option>
                    <option value="mistral-large">🌪️ Mistral Large (ديف أوبس)</option>
                    <option value="phi-3.5-mini">📱 Phi-3.5 Mini (موبايل | خفيف)</option>
                </optgroup>
                <!-- بقية النماذج كما في السابق -->
            </select>
        </div>

        <div class="messages-container" id="messages"></div>

        <div class="input-area">
            <textarea id="message-input" rows="1" placeholder="اكتب رسالتك..."></textarea>
            <button id="send-btn">📤 إرسال</button>
            <button id="stop-btn">⏹️ إيقاف</button>
        </div>
    </div>

    <script>
        // إعدادات
        const STORAGE_KEY = 'shadmini_chats_v3';
        let chats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        let currentChatId = null;
        let currentAbortController = null;
        let currentStreamingElement = null;

        // عناصر
        const chatListEl = document.getElementById('chat-list');
        const messagesEl = document.getElementById('messages');
        const chatTitle = document.getElementById('chat-title');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const newChatBtn = document.getElementById('new-chat-btn');
        const modelSelect = document.getElementById('model-select');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const themeToggle = document.getElementById('theme-toggle');
        const searchInput = document.getElementById('search-input');

        // دوال
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        }

        function saveChats() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(chats));
        }

        function renderChatList(filter = '') {
            if (!chatListEl) return;
            chatListEl.innerHTML = '';
            const sortedIds = Object.keys(chats).sort((a, b) => (chats[b].lastUpdated || 0) - (chats[a].lastUpdated || 0));
            for (let id of sortedIds) {
                const chat = chats[id];
                if (filter && !chat.title.includes(filter)) continue;
                const item = document.createElement('div');
                item.className = 'chat-item' + (id === currentChatId ? ' active' : '');
                item.innerHTML = `
                    <span class="chat-title-text">${chat.title || 'محادثة فارغة'}</span>
                    <button class="delete-btn" data-id="${id}">🗑️</button>
                `;
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-btn')) {
                        e.stopPropagation();
                        deleteChat(id);
                    } else {
                        loadChat(id);
                    }
                });
                chatListEl.appendChild(item);
            }
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = chats[id];
            if (!chat) return;
            chatTitle.textContent = chat.title || 'محادثة';
            renderMessages(chat.messages || []);
            renderChatList();
            if (window.innerWidth <= 700) sidebar.classList.remove('open');
        }

        function renderMessages(messages) {
            messagesEl.innerHTML = '';
            messages.forEach((msg, index) => {
                const div = document.createElement('div');
                div.className = 'message ' + msg.role;
                div.innerHTML = marked.parse(msg.content);
                if (msg.role === 'ai') {
                    const actions = document.createElement('div');
                    actions.className = 'msg-actions';
                    actions.innerHTML = `<button class="copy-btn">📋</button><button class="regenerate-btn">🔄</button>`;
                    actions.querySelector('.copy-btn').addEventListener('click', () => {
                        navigator.clipboard.writeText(msg.content);
                        actions.querySelector('.copy-btn').textContent = '✅';
                        setTimeout(() => actions.querySelector('.copy-btn').textContent = '📋', 1500);
                    });
                    actions.querySelector('.regenerate-btn').addEventListener('click', () => regenerateMessage(index));
                    div.appendChild(actions);
                }
                messagesEl.appendChild(div);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        async function regenerateMessage(index) {
            if (!currentChatId || !chats[currentChatId]) return;
            const chat = chats[currentChatId];
            // إزالة الرسالة الحالية وجميع ما بعدها (لإعادة التوليد)
            chat.messages = chat.messages.slice(0, index);
            saveChats();
            renderMessages(chat.messages);
            // إرسال نفس سياق المحادثة الذي كان قبل الرسالة المحددة
            if (chat.messages.length > 0 && chat.messages[chat.messages.length-1].role === 'user') {
                // إذا كانت آخر رسالة مستخدم، نعيد إرسالها تلقائياً
                const userMsg = chat.messages[chat.messages.length-1].content;
                await sendMessage(userMsg);
            }
        }

        function stopGeneration() {
            if (currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
                stopBtn.style.display = 'none';
                sendBtn.style.display = 'inline-block';
                if (currentStreamingElement) {
                    currentStreamingElement.querySelector('.typing-indicator')?.remove();
                    if (currentStreamingElement.textContent === '⏳ جاري التفكير...') {
                        currentStreamingElement.remove();
                    }
                }
            }
        }

        async function sendMessage(overrideText = null) {
            const content = overrideText || messageInput.value.trim();
            if (!content) return;

            if (!currentChatId || !chats[currentChatId]) createNewChat();

            const chat = chats[currentChatId];
            chat.messages.push({ role: 'user', content: content, time: new Date().toLocaleTimeString() });
            chat.lastUpdated = Date.now();

            if (chat.title === 'محادثة جديدة') {
                chat.title = content.substring(0, 35) + (content.length > 35 ? '...' : '');
                chatTitle.textContent = chat.title;
            }

            saveChats();
            renderMessages(chat.messages);
            renderChatList();
            if (!overrideText) messageInput.value = '';

            // إنشاء عنصر مؤقت للرد
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            aiDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            messagesEl.appendChild(aiDiv);
            currentStreamingElement = aiDiv;
            messagesEl.scrollTop = messagesEl.scrollHeight;

            // إعداد AbortController
            currentAbortController = new AbortController();
            stopBtn.style.display = 'inline-block';
            sendBtn.style.display = 'none';

            try {
                const selectedModel = modelSelect.value;
                const response = await fetch('/api/ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: chat.messages.map(m => ({ role: m.role, content: m.content })),
                        model: selectedModel,
                        stream: true
                    }),
                    signal: currentAbortController.signal,
                });

                if (!response.ok) throw new Error(`خطأ ${response.status}`);

                // استقبال SSE
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    // معالجة بيانات SSE
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.chunk) {
                                // قد يكون chunk نصاً أو JSON من النموذج
                                try {
                                    const parsed = JSON.parse(data.chunk);
                                    if (parsed.choices?.[0]?.delta?.content) {
                                        fullContent += parsed.choices[0].delta.content;
                                    } else if (parsed.choices?.[0]?.message?.content) {
                                        fullContent += parsed.choices[0].message.content;
                                    }
                                } catch {
                                    fullContent += data.chunk;
                                }
                                aiDiv.innerHTML = marked.parse(fullContent);
                                messagesEl.scrollTop = messagesEl.scrollHeight;
                            }
                        }
                    }
                }

                // إضافة الرد النهائي
                chat.messages.push({ role: 'assistant', content: fullContent, time: new Date().toLocaleTimeString() });
                chat.lastUpdated = Date.now();
                saveChats();
                renderMessages(chat.messages);
                renderChatList();

            } catch (err) {
                if (err.name === 'AbortError') {
                    aiDiv.innerHTML += '<br><small>⏹️ تم إيقاف التوليد</small>';
                } else {
                    aiDiv.innerHTML = `❌ خطأ: ${err.message}`;
                }
            } finally {
                currentAbortController = null;
                stopBtn.style.display = 'none';
                sendBtn.style.display = 'inline-block';
                currentStreamingElement = null;
            }
        }

        function createNewChat() {
            const id = generateId();
            chats[id] = { title: 'محادثة جديدة', messages: [], lastUpdated: Date.now() };
            saveChats();
            currentChatId = id;
            chatTitle.textContent = 'محادثة جديدة';
            renderMessages([]);
            renderChatList();
            messageInput.focus();
        }

        function deleteChat(id) {
            if (!confirm('حذف المحادثة؟')) return;
            delete chats[id];
            saveChats();
            if (currentChatId === id) {
                const ids = Object.keys(chats);
                if (ids.length) loadChat(ids[ids.length-1]);
                else { currentChatId = null; chatTitle.textContent = 'محادثة جديدة'; renderMessages([]); }
            }
            renderChatList();
        }

        // إعادة تسمية بالضغط المزدوج
        chatTitle.addEventListener('dblclick', () => {
            const newTitle = prompt('اسم جديد للمحادثة:', chatTitle.textContent);
            if (newTitle && currentChatId && chats[currentChatId]) {
                chats[currentChatId].title = newTitle;
                saveChats();
                chatTitle.textContent = newTitle;
                renderChatList();
            }
        });

        // بحث
        searchInput.addEventListener('input', (e) => {
            renderChatList(e.target.value);
        });
        // تفعيل البحث بزر مخفي أو من الشريط
        newChatBtn.addEventListener('dblclick', () => {
            searchInput.style.display = searchInput.style.display === 'none' ? 'block' : 'none';
        });

        // إرسال
        sendBtn.addEventListener('click', () => sendMessage());
        stopBtn.addEventListener('click', stopGeneration);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        newChatBtn.addEventListener('click', createNewChat);
        menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

        // وضع داكن/فاتح
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeToggle.innerHTML = isLight ? '<span>☀️</span><span>وضع فاتح</span>' : '<span>🌙</span><span>وضع داكن</span>';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });

        // تحميل أولي
        (function init() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeToggle.innerHTML = '<span>☀️</span><span>وضع فاتح</span>';
            }
            const ids = Object.keys(chats);
            if (ids.length) {
                const sorted = ids.sort((a, b) => (chats[b].lastUpdated || 0) - (chats[a].lastUpdated || 0));
                loadChat(sorted[0]);
            } else {
                createNewChat();
            }
            renderChatList();
        })();
