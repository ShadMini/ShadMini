<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ShadMini AI · المساعد الذكي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
</head>
<body>

    <button class="menu-btn" id="menuBtn">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
            <span class="dot">✦</span>
            <h2>ShadMini AI</h2>
        </div>
        <div class="theme-row" id="themeToggle">
            <span>🌙</span><span>المظهر الداكن</span>
        </div>
        <button class="btn-new" id="newChatBtn">✨ محادثة جديدة</button>
        <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main">
        <div class="topbar" id="chatTitle">محادثة جديدة</div>
        <div class="model-bar">
            <span>🧠</span>
            <select id="modelSelect">
                <optgroup label="محادثة عامة">
                    <option value="gpt-4o-mini">⚡ GPT-4o Mini</option>
                    <option value="deepseek-r1">🧠 DeepSeek R1</option>
                    <option value="llama-3.1-8b">📝 Llama 3.1 8B</option>
                    <option value="gpt-4.1-nano">⚡ GPT-4.1 Nano</option>
                    <option value="aya-expanse-8b">🌍 Aya Expanse</option>
                    <option value="jais-30b">🇸🇦 Jais 30B</option>
                </optgroup>
                <optgroup label="تطوير وبرمجة">
                    <option value="llama-3.3-70b">🦙 Llama 3.3 70B</option>
                    <option value="deepseek-coder-v2">💻 DeepSeek Coder V2</option>
                    <option value="codestral">🛠️ Codestral</option>
                    <option value="phi-3.5-moe">🧩 Phi-3.5 MoE</option>
                    <option value="mistral-large">🌪️ Mistral Large</option>
                    <option value="phi-3.5-mini">📱 Phi-3.5 Mini</option>
                </optgroup>
                <optgroup label="بيانات وأمن">
                    <option value="gemma-2-27b">📊 Gemma 2 27B</option>
                    <option value="phi-4">🔬 Phi-4</option>
                    <option value="cohere-command-r7b">🔒 Command R7B</option>
                </optgroup>
            </select>
        </div>
        <div class="msgs" id="messages"></div>
        <div class="input-row">
            <textarea id="msgInput" rows="1" placeholder="اكتب رسالتك..."></textarea>
            <button class="btn-send" id="sendBtn">➤</button>
            <button class="btn-stop" id="stopBtn">■</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
